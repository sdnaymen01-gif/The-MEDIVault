<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical OS Vault - Clinical Luxury</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .outfit {
            font-family: 'Outfit', sans-serif;
        }
        
        /* Mesh Gradient Background */
        .mesh-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 25%, #e9ecef 50%, #f8f9fa 75%, #ffffff 100%);
            background-size: 400% 400%;
            animation: meshFlow 15s ease infinite;
        }
        
        @keyframes meshFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Intense Glassmorphism */
        .glass-intense {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 48px 0 rgba(31, 38, 135, 0.1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.75);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.3);
        }
        
        .btn-glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Modal Overlay */
        .modal-overlay {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(80px);
            -webkit-backdrop-filter: blur(80px);
        }
        
        /* Smooth Transitions */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Input Styles */
        .input-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
        }
        
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }
        
        /* Lecture Content Frame */
        .lecture-frame {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(100px);
            -webkit-backdrop-filter: blur(100px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Main App Component
        function MedicalOSVault() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [password, setPassword] = useState('');
            const [vaultPassword, setVaultPassword] = useState('0000');
            const [lectures, setLectures] = useState([]);
            const [showAddLecture, setShowAddLecture] = useState(false);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [selectedLecture, setSelectedLecture] = useState(null);
            const [newLecture, setNewLecture] = useState({ title: '', htmlCode: '' });
            const [newPassword, setNewPassword] = useState('');

            // Load data from localStorage on mount
            useEffect(() => {
                const savedPassword = localStorage.getItem('vaultPassword');
                const savedLectures = localStorage.getItem('lectures');
                
                if (savedPassword) setVaultPassword(savedPassword);
                if (savedLectures) setLectures(JSON.parse(savedLectures));
            }, []);

            // Save lectures to localStorage
            useEffect(() => {
                if (lectures.length > 0) {
                    localStorage.setItem('lectures', JSON.stringify(lectures));
                }
            }, [lectures]);

            // Handle Login
            const handleLogin = (e) => {
                e.preventDefault();
                
                if (password === vaultPassword) {
                    setIsAuthenticated(true);
                    setIsAdmin(false);
                } else if (password === vaultPassword + 'aymen') {
                    setIsAuthenticated(true);
                    setIsAdmin(true);
                } else {
                    alert('Incorrect password. Please try again.');
                }
                
                setPassword('');
            };

            // Handle Logout
            const handleLogout = () => {
                setIsAuthenticated(false);
                setIsAdmin(false);
                setShowAddLecture(false);
                setShowAdminPanel(false);
                setSelectedLecture(null);
            };

            // Install New Lecture
            const handleInstallLecture = () => {
                if (!newLecture.title || !newLecture.htmlCode) {
                    alert('Please provide both title and HTML code.');
                    return;
                }

                const lecture = {
                    id: Date.now(),
                    title: newLecture.title,
                    htmlCode: newLecture.htmlCode,
                    createdAt: new Date().toISOString()
                };

                setLectures([...lectures, lecture]);
                setNewLecture({ title: '', htmlCode: '' });
                setShowAddLecture(false);
                alert('Lecture installed successfully!');
            };

            // Delete Lecture
            const handleDeleteLecture = (id) => {
                if (confirm('Are you sure you want to delete this lecture?')) {
                    setLectures(lectures.filter(l => l.id !== id));
                    if (selectedLecture?.id === id) {
                        setSelectedLecture(null);
                    }
                }
            };

            // Update Password
            const handleUpdatePassword = () => {
                if (!newPassword) {
                    alert('Please enter a new password.');
                    return;
                }

                localStorage.setItem('vaultPassword', newPassword);
                setVaultPassword(newPassword);
                setNewPassword('');
                alert('Password updated successfully!');
            };

            // Login Screen
            if (!isAuthenticated) {
                return (
                    <div className="mesh-gradient min-h-screen flex items-center justify-center p-4">
                        <div className="glass-intense rounded-3xl p-12 max-w-md w-full fade-in">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-20 h-20 rounded-full glass-panel mb-6">
                                    <svg className="w-10 h-10 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                    </svg>
                                </div>
                                <h1 className="text-4xl font-bold text-gray-800 mb-2 outfit">Medical OS Vault</h1>
                                <p className="text-gray-600 font-light">Clinical Luxury Edition</p>
                            </div>
                            
                            <form onSubmit={handleLogin}>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium text-gray-700 mb-2">
                                        Access Code
                                    </label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="input-glass w-full px-4 py-3 rounded-xl text-gray-800 placeholder-gray-400"
                                        placeholder="Enter vault password"
                                        autoFocus
                                    />
                                </div>
                                
                                <button
                                    type="submit"
                                    className="btn-primary w-full py-3 rounded-xl font-semibold text-white"
                                >
                                    Unlock Vault
                                </button>
                            </form>
                            
                            <p className="text-center text-xs text-gray-500 mt-6">
                                Secured with end-to-end encryption
                            </p>
                        </div>
                    </div>
                );
            }

            // Main Dashboard
            return (
                <div className="mesh-gradient min-h-screen">
                    {/* Header */}
                    <header className="glass-intense border-b border-white/20 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-4">
                                    <div className="w-12 h-12 rounded-xl glass-panel flex items-center justify-center">
                                        <svg className="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                        </svg>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-gray-800 outfit">Medical OS Vault</h1>
                                        <p className="text-xs text-gray-600">{lectures.length} Lectures Installed</p>
                                    </div>
                                </div>
                                
                                <div className="flex items-center space-x-3">
                                    {isAdmin && (
                                        <>
                                            <button
                                                onClick={() => setShowAddLecture(true)}
                                                className="btn-primary px-6 py-2.5 rounded-xl font-medium text-sm flex items-center space-x-2"
                                            >
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                                </svg>
                                                <span>New Lecture</span>
                                            </button>
                                            
                                            <button
                                                onClick={() => setShowAdminPanel(true)}
                                                className="btn-glass px-6 py-2.5 rounded-xl font-medium text-sm text-gray-700"
                                            >
                                                Admin
                                            </button>
                                        </>
                                    )}
                                    
                                    <button
                                        onClick={handleLogout}
                                        className="btn-glass px-6 py-2.5 rounded-xl font-medium text-sm text-gray-700"
                                    >
                                        Logout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-12">
                        {lectures.length === 0 ? (
                            <div className="text-center py-20">
                                <div className="inline-flex items-center justify-center w-24 h-24 rounded-full glass-panel mb-6">
                                    <svg className="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2 outfit">No Lectures Installed</h2>
                                <p className="text-gray-600 mb-6">Your vault is empty. Install your first lecture to get started.</p>
                                {isAdmin && (
                                    <button
                                        onClick={() => setShowAddLecture(true)}
                                        className="btn-primary px-8 py-3 rounded-xl font-semibold inline-flex items-center space-x-2"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                        </svg>
                                        <span>Install First Lecture</span>
                                    </button>
                                )}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {lectures.map((lecture) => (
                                    <div
                                        key={lecture.id}
                                        className="glass-card rounded-2xl p-6 cursor-pointer group"
                                        onClick={() => setSelectedLecture(lecture)}
                                    >
                                        <div className="flex items-start justify-between mb-4">
                                            <div className="w-12 h-12 rounded-xl glass-panel flex items-center justify-center">
                                                <svg className="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                </svg>
                                            </div>
                                            
                                            {isAdmin && (
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        handleDeleteLecture(lecture.id);
                                                    }}
                                                    className="opacity-0 group-hover:opacity-100 transition-opacity btn-glass p-2 rounded-lg hover:bg-red-50"
                                                >
                                                    <svg className="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                    </svg>
                                                </button>
                                            )}
                                        </div>
                                        
                                        <h3 className="text-lg font-semibold text-gray-800 mb-2 outfit line-clamp-2">
                                            {lecture.title}
                                        </h3>
                                        
                                        <p className="text-sm text-gray-600 mb-4">
                                            Installed {new Date(lecture.createdAt).toLocaleDateString()}
                                        </p>
                                        
                                        <div className="flex items-center text-purple-600 text-sm font-medium">
                                            <span>Open Lecture</span>
                                            <svg className="w-4 h-4 ml-2 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                            </svg>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Add Lecture Modal */}
                    {showAddLecture && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay fade-in">
                            <div className="glass-panel rounded-3xl p-8 max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800 outfit">Install New Lecture</h2>
                                    <button
                                        onClick={() => setShowAddLecture(false)}
                                        className="btn-glass p-2 rounded-lg"
                                    >
                                        <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Lecture Title
                                        </label>
                                        <input
                                            type="text"
                                            value={newLecture.title}
                                            onChange={(e) => setNewLecture({...newLecture, title: e.target.value})}
                                            className="input-glass w-full px-4 py-3 rounded-xl text-gray-800"
                                            placeholder="e.g., Cardiovascular Physiology"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            HTML Code (Paste Complete Code)
                                        </label>
                                        <textarea
                                            value={newLecture.htmlCode}
                                            onChange={(e) => setNewLecture({...newLecture, htmlCode: e.target.value})}
                                            className="input-glass w-full px-4 py-3 rounded-xl text-gray-800 font-mono text-sm"
                                            rows={16}
                                            placeholder="<!DOCTYPE html>..."
                                        />
                                    </div>
                                    
                                    <div className="flex space-x-4">
                                        <button
                                            onClick={handleInstallLecture}
                                            className="btn-primary flex-1 py-3 rounded-xl font-semibold"
                                        >
                                            Install Lecture
                                        </button>
                                        <button
                                            onClick={() => setShowAddLecture(false)}
                                            className="btn-glass flex-1 py-3 rounded-xl font-semibold text-gray-700"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Panel Modal */}
                    {showAdminPanel && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay fade-in">
                            <div className="glass-panel rounded-3xl p-8 max-w-md w-full">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800 outfit">Admin Panel</h2>
                                    <button
                                        onClick={() => setShowAdminPanel(false)}
                                        className="btn-glass p-2 rounded-lg"
                                    >
                                        <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="glass-intense rounded-xl p-4">
                                        <p className="text-sm text-gray-600 mb-1">Current Password</p>
                                        <p className="text-lg font-bold text-gray-800 font-mono">{vaultPassword}</p>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            New Password
                                        </label>
                                        <input
                                            type="text"
                                            value={newPassword}
                                            onChange={(e) => setNewPassword(e.target.value)}
                                            className="input-glass w-full px-4 py-3 rounded-xl text-gray-800"
                                            placeholder="Enter new password"
                                        />
                                    </div>
                                    
                                    <button
                                        onClick={handleUpdatePassword}
                                        className="btn-primary w-full py-3 rounded-xl font-semibold"
                                    >
                                        Update Password
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Lecture Viewer Modal */}
                    {selectedLecture && (
                        <div className="fixed inset-0 z-50 modal-overlay fade-in">
                            <div className="h-full flex flex-col">
                                {/* Modal Header */}
                                <div className="glass-intense border-b border-white/20 px-6 py-4">
                                    <div className="flex items-center justify-between max-w-7xl mx-auto">
                                        <h2 className="text-xl font-bold text-gray-800 outfit">{selectedLecture.title}</h2>
                                        <button
                                            onClick={() => setSelectedLecture(null)}
                                            className="btn-glass p-2.5 rounded-xl hover:bg-red-50 transition-colors"
                                        >
                                            <svg className="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                
                                {/* Lecture Content Frame */}
                                <div className="flex-1 overflow-hidden">
                                    <iframe
                                        srcDoc={selectedLecture.htmlCode}
                                        className="w-full h-full border-0"
                                        sandbox="allow-scripts allow-same-origin allow-forms"
                                        title={selectedLecture.title}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render App
        ReactDOM.render(<MedicalOSVault />, document.getElementById('root'));
    </script>
</body>
</html>
